configuration:
  enabled:
    name: Enable Jarvis
    description: Turns the chatbot endpoint on or off.
  openai_api_key:
    name: OpenAI API key
    description: API key from the OpenAI platform. This is not your ChatGPT login password.
  create_persistent_notification_on_online:
    name: Create persistent notification when online
    description: Creates or updates a Home Assistant persistent notification when Jarvis starts.
  system_prompt:
    name: System prompt
    description: Main behaviour instruction given to Jarvis before each reply.
  reset_main_to_default_on_start:
    name: Reset editable program on next start
    description: Backs up /config/jarvis/main.py, installs the add-on's current default, and then turns itself off.
