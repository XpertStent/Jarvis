name: "Jarvis"
version: "1.1.0"
slug: "jarvis"
description: "Python-based AI chatbot side panel for Home Assistant. Editable file placed in /config/jarvis/main.py"
url: "https://developers.home-assistant.io/docs/apps/configuration/"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
stage: experimental

# Shows Jarvis as a Home Assistant sidebar item through Supervisor ingress.
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot
panel_title: Jarvis
panel_admin: true

# Allows the add-on to call Home Assistant Core through http://supervisor/core/api
homeassistant_api: true

# Allows Jarvis to remove settings retired by newer versions from its own options.
hassio_api: true

# Mount the main Home Assistant /config folder inside this container as /config.
# The editable Jarvis program will be placed in /config/jarvis/main.py on first start.
map:
  - type: homeassistant_config
    read_only: false
    path: /config

options:
  enabled: true
  openai_api_key: ""
  create_persistent_notification_on_online: true
  system_prompt: "You are Jarvis, a concise Home Assistant chatbot. Help the user clearly and safely. In v1, do not claim to control devices unless code for that is added later."
  reset_main_to_default_on_start: false

schema:
  enabled: bool
  openai_api_key: password
  create_persistent_notification_on_online: bool
  system_prompt: str
  reset_main_to_default_on_start: bool
